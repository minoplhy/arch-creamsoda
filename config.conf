# Central Configuration for the Arch Linux AUR-Based Repository System

# Name of the custom repository. This is used in the pacman database name (e.g. custom.db.tar.gz)
REPO_NAME="custom"

# Output directory for built packages and database files.
# Relative to the workspace root or absolute path.
REPO_DIR="repo"

# Directory where package branch worktrees will be checked out.
PACKAGES_DIR="packages"

# Directory where compilation logs and overall run logs are stored.
LOG_DIR="logs"

# Method to compile packages.
# "makepkg" - Run makepkg -s --noconfirm directly (fast, simple).
# "chroot"  - Run makechrootpkg inside a clean systemd-nspawn container (requires devtools).
BUILD_METHOD="chroot"

# Custom chroot directory for "chroot" build method (optional).
# If left empty, the default /var/lib/archbuild/extra-x86_64 will be used.
# Relative to the workspace root or absolute path.
CHROOT_DIR=""


# Enable GPG signature generation for built packages and database.
SIGN_PACKAGES="false"

# GPG Key ID to use for signing (required if SIGN_PACKAGES="true").
GPG_KEY=""

# Automatically remove older versions of package files from REPO_DIR when adding a new version.
CLEAN_OLD_PACKAGES="true"

# Enable caching of downloaded package source files (e.g. source tarballs, git clones).
CACHE_SOURCES="true"

# Directory where downloaded source files will be cached.
# Relative to the workspace root or absolute path.
SOURCE_CACHE_DIR="cache/sources"

# Enable caching of downloaded pacman package dependencies for chroot builds.
# This prevents downloading package dependencies repeatedly on clean chroot rebuilds.
CACHE_PACMAN_PACKAGES="true"

# Directory where pacman package dependencies will be cached for the chroot.
# Relative to the workspace root or absolute path.
PACMAN_CACHE_DIR="cache/packages"

# Destination to publish the built repository (Optional).
# Supports any rsync-compatible path (e.g. "user@yourserver.com:/var/www/html/repo/").
# If left empty, running `./manage.sh publish` will display instructions for manual/Git hosting.
PUBLISH_DEST=""
