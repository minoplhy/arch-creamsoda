name: Test Suite CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          ./tests/run_tests.sh

      - name: Run Docker Integration Tests
        run: |
          ./tests/run_docker_tests.sh
