name: Scheduled Package Upgrade Checks

# NOTE: This is a template workflow. It should be moved/copied to the parent
# package repository where the actual package branches are hosted.
# Automatic cron is disabled by default to prevent runs on the engine repository.

on:
  # schedule:
  #   # Run daily at midnight
  #   - cron: '0 0 * * *'
  # Allow manual execution for testing purposes in the engine repo
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upgrades:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm git jq curl base-devel sudo github-cli

      - name: Checkout Repository with Full History
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to fetch all branch metadata

      - name: Configure Git Credentials
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Non-Root Builder User for Makepkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Scan and Upgrade Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > run-upgrade.sh
          #!/bin/bash
          echo "=== Configuring Git Credentials and Safe Directory ==="
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "$GITHUB_WORKSPACE"
          
          echo "=== Repository Status ==="
          echo "Current User: $(whoami)"
          echo "Current Directory: $(pwd)"
          git status
          
          echo "=== Initializing GitHub Labels ==="
          gh label create "aur-upgrade" --color "0e8a16" --description "Automated AUR package upgrade" 2>/dev/null || true
          export AUR_LABEL_CREATED=1
          
          echo "=== Fetching Remote Branches ==="
          git fetch --all --prune
          
          echo "=== Recreating Local Tracking Branches and Worktrees ==="
          mkdir -p packages
          for remote_ref in $(git for-each-ref --format='%(refname)' refs/remotes/origin/); do
            branch=${remote_ref#refs/remotes/origin/}
            if [ "$branch" = "HEAD" ] || [ "$branch" = "master" ] || [ "$branch" = "main" ] || [[ "$branch" =~ ^upgrade/ ]]; then
              continue
            fi
            echo "Tracking remote branch: $branch -> origin/$branch"
            git branch -f "$branch" "origin/$branch" || true
            
            if [ ! -d "packages/$branch" ]; then
              echo "Creating worktree for $branch at packages/$branch..."
              git worktree add "packages/$branch" "$branch" || true
            fi
          done
          
          # Initialize results log
          REPORT_FILE="$GITHUB_WORKSPACE/upgrade_results.txt"
          > "$REPORT_FILE"
          
          # Get all local branch names tracking package streams
          branches=$(git for-each-ref --format='%(refname:short)' refs/heads/)
          echo "=== Branches Found for Scanning ==="
          echo "$branches"
          echo "=================================================="
          
          for branch in $branches; do
            # Skip master, main and temporary upgrade branches
            if [ "$branch" = "master" ] || [ "$branch" = "main" ] || [[ "$branch" =~ ^upgrade/ ]]; then
              continue
            fi
            
            echo "================================================================================"
            echo "Processing upgrade check for package: $branch"
            echo "================================================================================"
            
            # Check version status
            version_output=$(./manage.sh version-check "$branch" 2>&1)
            check_status=$?
            echo "$version_output"
            
            # Extract local and upstream versions
            local_ver=$(echo "$version_output" | grep "^LOCAL=" | cut -d'=' -f2-)
            upstream_ver=$(echo "$version_output" | grep "^UPSTREAM=" | cut -d'=' -f2-)
            
            [ -z "$local_ver" ] && local_ver="unknown"
            [ -z "$upstream_ver" ] && upstream_ver="unknown"
            
            if [ $check_status -eq 0 ]; then
              # Already up to date: successful
              echo "$branch|successful|$local_ver|$upstream_ver|Package is up-to-date" >> "$REPORT_FILE"
            elif [ $check_status -eq 2 ]; then
              # Status 2 indicates OUT-OF-DATE. Attempt to run upgrade in PR mode.
              echo "Package '$branch' is out-of-date. Opening PR..."
              upgrade_output=$(./manage.sh upgrade "$branch" --pr 2>&1)
              upgrade_status=$?
              echo "$upgrade_output"
              
              if [ $upgrade_status -eq 0 ]; then
                # Successfully upgraded/bumped
                pr_url=$(echo "$upgrade_output" | grep -o -E "https://github.com/[^/]+/[^/]+/pull/[0-9]+")
                if [ -n "$pr_url" ]; then
                  echo "$branch|bump|$local_ver|$upstream_ver|Upgrade PR opened: $pr_url" >> "$REPORT_FILE"
                else
                  echo "$branch|bump|$local_ver|$upstream_ver|Upgrade PR opened" >> "$REPORT_FILE"
                fi
              else
                # Upgrade failed
                err_msg=$(echo "$upgrade_output" | grep -iE "error|fail" | tail -n 1 | tr -d '|' | cut -c1-100)
                [ -z "$err_msg" ] && err_msg="Upgrade failed"
                echo "$branch|failed|$local_ver|$upstream_ver|$err_msg" >> "$REPORT_FILE"
              fi
            else
              # Version check failed
              err_msg=$(echo "$version_output" | grep -iE "error|fail" | tail -n 1 | tr -d '|' | cut -c1-100)
              [ -z "$err_msg" ] && err_msg="Version check failed"
              echo "$branch|failed|$local_ver|$upstream_ver|$err_msg" >> "$REPORT_FILE"
            fi
            echo ""
          done
          EOF
          
          chmod +x run-upgrade.sh
          chown builder:builder run-upgrade.sh
          
          # Run the script as the builder user
          sudo -u builder -i sh -c "export GITHUB_WORKSPACE='$GITHUB_WORKSPACE' GITHUB_TOKEN='$GITHUB_TOKEN'; /bin/bash '$GITHUB_WORKSPACE/run-upgrade.sh'"
          
          # Process results and write to Step Summary
          REPORT_FILE="$GITHUB_WORKSPACE/upgrade_results.txt"
          if [ -f "$REPORT_FILE" ]; then
            echo "=== Generating Step Summary Report ==="
            {
              echo "### 📦 Scheduled Package Upgrade Report"
              echo ""
              echo "| Package | Status | Local Version | Upstream Version | Details |"
              echo "| :--- | :--- | :--- | :--- | :--- |"
            } >> "$GITHUB_STEP_SUMMARY"
            
            while IFS='|' read -r pkg status local_ver upstream_ver details; do
              case "$status" in
                successful)
                  status_badge="🟢 **successful**"
                  ;;
                bump)
                  status_badge="🔵 **bump**"
                  if [[ "$details" =~ (https://github.com/[^/]+/[^/]+/pull/[0-9]+) ]]; then
                    pr_url="${BASH_REMATCH[1]}"
                    details="[View Pull Request]($pr_url)"
                  fi
                  ;;
                failed)
                  status_badge="🔴 **failed**"
                  ;;
                *)
                  status_badge="⚪ $status"
                  ;;
              esac
              echo "| \`$pkg\` | $status_badge | \`$local_ver\` | \`$upstream_ver\` | $details |" >> "$GITHUB_STEP_SUMMARY"
            done < "$REPORT_FILE"
            
            rm -f "$REPORT_FILE"
          else
            echo "### ⚠️ Package Upgrade Report Error" >> "$GITHUB_STEP_SUMMARY"
            echo "No upgrade results file found." >> "$GITHUB_STEP_SUMMARY"
          fi


